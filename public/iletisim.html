<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="e-menu">
        <div class="e-sol-blok">
            <a href="index.html" class="e-logo-link">
                <img src="resimler/pera_logo2.jpeg" alt="" class="e-logo-resim">
            </a> 
        </div>
        <div class="e-sag-blok">
            <ul class="menu-linkler">
                <li><a href="/">Anasayfa</a></li>
                <li><a href="/konserler">Konserler</a></li>
                <li><a href="/kullanici-giris">Giriş/Kayıt</a></li>
                <li><a href="/iletisim">İletişim</a></li>
            </ul>
        </div>
    </nav>

    <section class="e-iletisim-alani">
        
        <div class="e-iletisim-sol">
            <h2>Bizimle İletişime Geçin</h2>
            
            <div class="e-bilgi-listesi">
                <p><i class="fa-solid fa-location-dot"></i> <strong>Adres:</strong> Kadıköy / İstanbul</p>
                <p><i class="fa-solid fa-phone"></i> <strong>Telefon:</strong> +90 (555) 555 00 00</p>
                <p><i class="fa-solid fa-envelope"></i> <strong>E-posta:</strong> iletisim@perakonser.com</p>
            </div>

            <div class="e-harita-kapsayici">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3013.9161748286913!2d29.317585376543166!3d40.92854962499105!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cadb1e2ca48fad%3A0x679657b98bfcc5!2sTeknopark%20%C4%B0stanbul!5e0!3m2!1str!2str!4v1717180000000!5m2!1str!2str" 
                    width="100%" 
                    height="300" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>

        <div class="e-iletisim-sag">
            <h3>Mesaj Gönderin</h3>
            
            <form action="/e-mesaj-gonder" method="POST" class="e-iletisim-formu">
                
                <div class="e-form-grup">
                    <label>Adınız Soyadınız *</label>
                    <input type="text" name="e_adsoyad" required>
                </div>

                <div class="e-form-grup">
                    <label>E-posta Adresiniz *</label>
                    <input type="email" name="e_eposta" required>
                </div>

                <div class="e-form-grup">
                    <label>Mesaj Konusu *</label>
                    <select name="e_konu" required>
                        <option value="">Lütfen bir konu seçiniz...</option>
                        <option value="bilet">Bilet İşlemleri / İade</option>
                        <option value="sponsor">Sponsorluk ve Organizasyon</option>
                        <option value="genel">Genel Öneri / Şikayet</option>
                    </select>
                </div>

                <div class="e-form-grup">
                    <label>Profil Türünüz *</label>
                    <div class="e-radio-secenekleri">
                        <label>
                            <input type="radio" name="e_profil_turu" value="dinleyici" checked> Dinleyici / Hayran
                        </label>
                        <label>
                            <input type="radio" name="e_profil_turu" value="organizator"> Organizatör / Mekan Sahibi
                        </label>
                    </div>
                </div>

                <div class="e-form-grup">
                    <label>Mesajınız *</label>
                    <textarea name="e_mesaj" rows="5" required></textarea>
                </div>

                <button type="submit" class="e-iletisim-butonu">MESAJI GÖNDER</button>
            </form>
        </div>

    </section>

</body>
</html>
